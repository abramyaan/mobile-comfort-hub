name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare Static Files
        id: prepare # Добавили ID, чтобы обращаться к результатам этого шага
        run: |
          # 1. Определяем директорию билда
          if [ -d ".output/public" ]; then
            DEST=".output/public"
          elif [ -d "dist/client" ]; then
            DEST="dist/client"
          else
            DEST="dist"
          fi
          
          echo "Found static files in: $DEST"

          # 2. Переходим в папку
          cd $DEST || exit 1

          # 3. Фикс index.html
          if [ ! -f index.html ]; then
            echo "Searching for index.html..."
            # Ищем index.html в подпапках и копируем в корень DEST
            ACTUAL_INDEX=$(find . -name "index.html" | head -n 1)
            if [ -n "$ACTUAL_INDEX" ]; then
              cp "$ACTUAL_INDEX" ./index.html
            fi
          fi

          # 4. Фикс для роутинга GitHub Pages
          if [ -f index.html ]; then
            cp index.html 404.html
          fi
          
          touch .nojekyll
          
          # Сохраняем путь в output шага (это уберет предупреждение в VS Code)
          echo "publish_path=$DEST" >> $GITHUB_OUTPUT

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Используем путь через outputs, теперь VS Code поймет это
          path: ${{ steps.prepare.outputs.publish_path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4