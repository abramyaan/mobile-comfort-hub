name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Debug Output Structure
        run: |
          echo "==== КОРЕНЬ ПРОЕКТА ===="
          ls -F
          echo "==== ИЩЕМ ВСЕ ПАПКИ 'dist' или '.output' ===="
          find . -maxdepth 2 -type d
          echo "==== СОДЕРЖИМОЕ ПАПКИ .output (если есть) ===="
          ls -R .output 2>/dev/null || echo "Папка .output не найдена"
          echo "==== СОДЕРЖИМОЕ ПАПКИ dist (если есть) ===="
          ls -R dist 2>/dev/null || echo "Папка dist не найдена"

      - name: Prepare Files
        run: |
          # Пытаемся найти, куда упал билд. 
          # Для TanStack Start часто это .output/public
          if [ -d ".output/public" ]; then
            DEST=".output/public"
          elif [ -d "dist/client" ]; then
            DEST="dist/client"
          else
            DEST="dist"
          fi
          
          echo "Используем директорию: $DEST"
          
          # Если там нет index.html, попробуем найти его и скопировать туда
          if [ ! -f "$DEST/index.html" ]; then
            find . -name "index.html" -not -path "./node_modules/*" -exec cp {} $DEST/ \;
          fi
          
          cd $DEST
          cp index.html 404.html
          touch .nojekyll
          # Сохраняем путь для следующего шага
          echo "FINAL_PATH=$DEST" >> $GITHUB_ENV

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.FINAL_PATH }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4