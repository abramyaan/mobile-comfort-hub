name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Post-build Fix
        run: |
          # Переходим в директорию билда
          # TanStack Start обычно кладет клиентские файлы в dist/client
          cd dist/client || exit 1

          # 1. Если index.html нет, создаем его вручную
          if [ ! -f index.html ]; then
            echo "Index.html not found, creating from template..."
            
            # Ищем главный JS файл (в Vite 7 он обычно в assets/index-HASH.js)
            JS_PATH=$(find assets -name "index-*.js" | head -n 1)
            CSS_PATH=$(find assets -name "index-*.css" | head -n 1)
            
            cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="ru">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Атлас — мобильные туалетные кабины</title>
              <link rel="stylesheet" href="/mobile-comfort-hub/${CSS_PATH}">
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/mobile-comfort-hub/${JS_PATH}"></script>
            </body>
          </html>
          EOF
          fi

          # 2. Делаем копию для роутинга (чтобы 404 не вылетало)
          cp index.html 404.html
          
          # 3. Отключаем Jekyll
          touch .nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4